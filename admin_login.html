<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | The MCC Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sage: #2E8B65;
      --sage2: #3DA176;
      --ink: #0A120E;
      --ink2: #0D1A12;
      --mist: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
      --white: #FFFFFF;
      --t1: #F8FAFB;
      --t2: rgba(255,255,255,0.7);
      --t3: rgba(255,255,255,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--ink);
      color: var(--t1);
      font-family: 'Outfit', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Ambient Background */
    .bg-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(46,139,101,0.15) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
      filter: blur(80px);
    }

    .login-card {
      background: var(--ink2);
      border: 1px solid var(--border);
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      padding: 48px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--sage), transparent);
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: 28px;
      color: var(--sage);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 14px;
      color: var(--t3);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--t3);
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.1em;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      color: white;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: all 0.3s;
    }

    input:focus {
      border-color: var(--sage);
      background: rgba(46,139,101,0.05);
      box-shadow: 0 0 0 4px rgba(46,139,101,0.1);
    }

    .btn-login {
      width: 100%;
      background: var(--sage);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      margin-top: 8px;
    }

    .btn-login:hover {
      background: var(--sage2);
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(46,139,101,0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .error-msg {
      background: rgba(255, 71, 71, 0.1);
      border: 1px solid rgba(255, 71, 71, 0.2);
      color: #ff7676;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 24px;
      display: none;
      text-align: center;
    }

    .loader {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note {
      text-align: center;
      font-size: 13px;
      color: var(--t3);
      margin-top: 32px;
    }

    .footer-link {
      color: var(--sage);
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  
  <div class="login-card">
    <div class="header">
      <div class="logo">MCC SHOP</div>
      <div class="subtitle">Admin Dashboard</div>
    </div>

    <div id="error" class="error-msg">Invalid phone or password</div>

    <form id="loginForm">
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="e.g. 0200000001" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="button" class="btn-login" onclick="handleLogin(event)">
        <span id="btnText">Sign In</span>
        <div id="loader" class="loader"></div>
      </button>
    </form>

    <div class="footer-note">
      Back to <a href="mcc_shop.html" class="footer-link">The Shop</a>
    </div>
  </div>

  <script>
    window.location.href = 'portal_login.html';
  </script>
</body>
</html>
