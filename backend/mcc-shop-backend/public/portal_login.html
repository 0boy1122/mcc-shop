<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Staff Portal | The MCC Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --sage: #2E8B65; --sage2: #3DA176; --ink: #0A120E; --ink2: #0D1A12; --border: rgba(255,255,255,0.1); --t1: #F8FAFB; --t2: rgba(255,255,255,0.7); --t3: rgba(255,255,255,0.4); }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--ink); color:var(--t1); font-family:'Outfit', sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; }
    .bg-glow { position:absolute; width:600px; height:600px; background:radial-gradient(circle, rgba(46,139,101,0.15) 0%, transparent 70%); top:50%; left:50%; transform:translate(-50%,-50%); z-index:-1; filter:blur(80px); }
    .login-card { background:var(--ink2); border:1px solid var(--border); border-radius:24px; width:100%; max-width:400px; padding:40px; box-shadow:0 40px 100px rgba(0,0,0,0.5); position:relative; overflow:hidden; backdrop-filter:blur(20px); }
    .header { text-align:center; margin-bottom:32px; }
    .logo { font-family:'Fraunces', serif; font-weight:900; font-size:24px; color:var(--sage); margin-bottom:4px; }
    .subtitle { font-size:12px; color:var(--t3); text-transform:uppercase; letter-spacing:0.1em; }

    /* Role Switcher */
    .role-switch { display:flex; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:12px; padding:4px; margin-bottom:32px; position:relative; }
    .role-btn { flex:1; padding:10px; border:none; background:none; color:var(--t3); font-size:12px; font-weight:700; cursor:pointer; position:relative; z-index:2; transition:0.3s; }
    .role-btn.active { color:white; }
    .role-pill { position:absolute; top:4px; left:4px; width:calc(50% - 4px); height:calc(100% - 8px); background:var(--sage); border-radius:8px; transition:0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index:1; }
    .role-switch[data-role="RIDER"] .role-pill { transform:translateX(100%); }

    .form-group { margin-bottom:20px; }
    label { display:block; font-size:11px; font-weight:600; color:var(--t3); text-transform:uppercase; margin-bottom:8px; }
    input { width:100%; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px; padding:12px 16px; color:white; font-family:inherit; font-size:16px; outline:none; transition:0.3s; }
    input:focus { border-color:var(--sage); background:rgba(46,139,101,0.05); }
    .pw-wrap { position:relative; }
    .pw-wrap input { padding-right:48px; }
    .pw-toggle { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--t3); cursor:pointer; padding:4px; display:flex; align-items:center; }
    .pw-toggle svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; }
    .btn-login { width:100%; background:var(--sage); color:white; border:none; border-radius:12px; padding:14px; font-size:15px; font-weight:600; cursor:pointer; transition:0.3s; margin-top:8px; }
    .btn-login:hover { background:var(--sage2); transform:translateY(-2px); box-shadow:0 10px 20px rgba(46,139,101,0.2); }
    .error-msg { background:rgba(255,71,71,0.1); border:1px solid rgba(255,71,71,0.2); color:#ff7676; padding:10px; border-radius:8px; font-size:12px; margin-bottom:20px; display:none; text-align:center; }
    
    .loader { display:none; width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .footer-note { text-align:center; font-size:12px; color:var(--t3); margin-top:24px; }
    .footer-link { color:var(--sage); text-decoration:none; font-weight:500; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="login-card">
    <div class="header">
      <div class="logo">MCC SHOP</div>
      <div class="subtitle" id="portalSub">Staff Portal</div>
    </div>

    <div class="role-switch" id="roleSwitch" data-role="ADMIN">
      <div class="role-pill"></div>
      <button class="role-btn active" onclick="setRole('ADMIN')">ADMIN</button>
      <button class="role-btn" onclick="setRole('RIDER')">RIDER</button>
    </div>

    <div id="error" class="error-msg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="020XXXXXXX" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="••••••••" required>
          <button type="button" class="pw-toggle" onclick="togglePw()" id="pwToggle" aria-label="Show password">
            <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login" id="submitBtn">
        <span id="btnText">Log In</span>
        <div id="loader" class="loader"></div>
      </button>
    </form>
    <div class="footer-note">Back to <a href="/" class="footer-link">The Shop</a></div>
  </div>

  <script>
    function togglePw() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      icon.innerHTML = showing
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    }

    let currentRole = 'ADMIN';
    function setRole(role) {
      currentRole = role;
      document.getElementById('roleSwitch').setAttribute('data-role', role);
      document.querySelectorAll('.role-btn').forEach(b => b.classList.toggle('active', b.innerText === role));
      document.getElementById('portalSub').innerText = role === 'ADMIN' ? 'Admin Management' : 'Rider Dispatch';
    }

    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;
      const btnText = document.getElementById('btnText');
      const loader = document.getElementById('loader');
      const errorDiv = document.getElementById('error');
      
      btnText.style.display = 'none'; loader.style.display = 'block'; errorDiv.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ phone, password, role: currentRole })
        });
        const data = await res.json();
        if (res.ok) {
          if (data.user.role !== currentRole) {
            throw new Error(`Access denied. This account is registered as ${data.user.role}.`);
          }
          localStorage.setItem('mcc_token', data.token);
          localStorage.setItem('mcc_user', JSON.stringify(data.user));
          window.location.href = currentRole === 'ADMIN' ? 'admin_dashboard.html' : 'rider_dashboard.html';
        } else { throw new Error(data.error || 'Login failed'); }
      } catch (err) {
        errorDiv.innerText = err.message; errorDiv.style.display = 'block';
        btnText.style.display = 'block'; loader.style.display = 'none';
      }
    };
  </script>
</body>
</html>
