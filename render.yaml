services:
  - type: web
    name: mcc-shop-api
    env: node
    buildCommand: "cd backend/mcc-shop-backend && npm install && npm run build"
    startCommand: "cd backend/mcc-shop-backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mcc-shop-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: "https://mcc-shop-frontend.onrender.com"
      - key: PORT
        value: 5000

databases:
  - name: mcc-shop-db
    databaseName: mcc_shop
    user: mcc_admin
    plan: free
